<!DOCTYPE html>
<html>
<head>
    <title>Course Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Select a Course</h1>
    <p>Course Portal</p>
</header>

<div class="container">

    <h2>Course Description</h2>
    <p>
        Courses
    </p>

</div>

<footer>
    <p>IFT 302 Course Website</p>
</footer>

</body>
</html>
